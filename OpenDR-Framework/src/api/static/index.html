<!DOCTYPE html>
<html>
<head>
    <title>OpenDR 1.0 Dashboard</title>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>body { margin: 0; padding: 0; } #map { position: absolute; top: 0; bottom: 0; width: 100%; }</style>
</head>
<body>
<div id="map"></div>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json', // Replace with local GeoServer vector tiles
        center: [39.22, 23.40], // Centered on Ethiopia Case Study
        zoom: 9
    });

    // Tier 4 -> Tier 5: Load Real-time Flood Alerts from pygeoapi
    map.on('load', () => {
        map.addSource('flood_alerts', {
            type: 'geojson',
            data: 'http://localhost/collections/flood_alerts/items'
        });
        map.addLayer({
            'id': 'flood-layer',
            'type': 'fill',
            'source': 'flood_alerts',
            'paint': { 'fill-color': '#08306b', 'fill-opacity': 0.7 }
        });
    });
</script>
</body>
</html>
