apiVersion: v1
kind: Service
metadata:
  name: dask-scheduler
spec:
  selector:
    app: dask-scheduler
  ports:
    - protocol: TCP
      port: 8786
      targetPort: 8786
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dask-worker
spec:
  replicas: 5 # Can be scaled up based on disaster magnitude
  template:
    spec:
      containers:
      - name: dask-worker
        image: opendr/compute-node:latest
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"